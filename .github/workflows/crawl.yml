name: ETF 데이터 자동 갱신

on:
  schedule:
    - cron: '0 23 * * 1-5'   # 평일 UTC 23:00 = KST 08:00 (주말 제외)
  workflow_dispatch:           # 수동 실행 버튼

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24 사용

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4.2.2

      - name: Python 설정
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install pykrx pandas

      - name: ETF 데이터 수집
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python scripts/crawl.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf_data.json
          git diff --cached --quiet || git commit -m "데이터 자동 갱신: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
